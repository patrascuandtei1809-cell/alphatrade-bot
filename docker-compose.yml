version: '3.8'

services:
  alphatrade:
    build: .
    container_name: alphatrade-bot
    ports:
      - "8501:8501"
    volumes:
      - ./bot_log.txt:/app/bot_log.txt
      - ./prices.csv:/app/prices.csv
      - ./trades.csv:/app/trades.csv
      - ./actions.csv:/app/actions.csv
      - ./bot_state.json:/app/bot_state.json
      - ./commands.json:/app/commands.json
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
